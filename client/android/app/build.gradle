plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.mit"
    compileSdk = 36
    ndkVersion = "27.0.12077973"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }

    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                keyAlias = keystoreProperties['keyAlias']
                keyPassword = keystoreProperties['keyPassword']
                storeFile = file(keystoreProperties['storeFile'])
                storePassword = keystoreProperties['storePassword']
            }
            enableV1Signing = true
            enableV2Signing = true
        }
    }

    defaultConfig {
        applicationId = "com.mit"
        // androidx.core 1.18+ (transitive from Flutter/plugins) requires minSdk 23.
        minSdkVersion = flutter.minSdkVersion
        targetSdk 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    packagingOptions {
        doNotStrip "*/arm64-v8a/libEmvCoreJni.so"
        doNotStrip "*/arm64-v8a/libSmartPosJni.so"
        doNotStrip "*/armeabi-v7a/libEmvCoreJni.so"
        doNotStrip "*/armeabi-v7a/libSmartPosJni.so"
    }

    buildTypes {
        release {
            // If no production keystore is configured, fall back to debug signing
            // so the generated release APK is still installable for testing.
            signingConfig = keystorePropertiesFile.exists()
                    ? signingConfigs.release
                    : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
}
